name: ptit_dms_flutter
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.5.0
  provider: ^6.1.5
  dio: ^5.9.2
  flutter_bloc: ^9.1.1
  cookie_jar: ^4.0.9
  dio_cookie_manager: ^3.4.0
  path_provider: ^2.1.5
  equatable: ^2.0.8
  flutter_svg: ^2.2.4
  file_picker: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
          weight: 400
        - asset: assets/fonts/Roboto-Medium.ttf
          weight: 500
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700

  uses-material-design: true

  assets:
    - assets/
    - assets/icons/
